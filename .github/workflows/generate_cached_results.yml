name: Generate Cached Results

on:
  push:
    branches: [main]
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  generate-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          docker system prune -af

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
           pip install git+https://github.com/embeddings-benchmark/mteb.git

      - name: Generate cached results
        run: |
          python scripts/generate_cached_results.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update cached-data branch
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        run: |
          # Check if __cached_results.json.gz was created
          if [ ! -f "__cached_results.json.gz" ]; then
            echo "❌ Cached results file not found"
            exit 1
          fi

          # Check if __cached_results.parquet was created
          if [ ! -f "__cached_results.parquet" ]; then
            echo "❌ Cached results parquet file not found"
            exit 1
          fi

          # Get file sizes for logging
          FILE_SIZE=$(stat -f%z __cached_results.json.gz 2>/dev/null || stat -c%s __cached_results.json.gz)
          PARQUET_SIZE=$(stat -f%z __cached_results.parquet 2>/dev/null || stat -c%s __cached_results.parquet)
          echo "📦 Generated cache file: $(echo "scale=1; $FILE_SIZE/1024/1024" | bc -l)MB"
          echo "📦 Generated parquet file: $(echo "scale=1; $PARQUET_SIZE/1024/1024" | bc -l)MB"

          # Move the generated files outside repository before rebuilding branch
          CACHE_TMP_PATH="$RUNNER_TEMP/__cached_results.json.gz"
          PARQUET_TMP_PATH="$RUNNER_TEMP/__cached_results.parquet"
          mv __cached_results.json.gz "$CACHE_TMP_PATH"
          mv __cached_results.parquet "$PARQUET_TMP_PATH"
          README_TMP_PATH="$RUNNER_TEMP/cached-data-README.md"

          # Preserve README.md from cached-data branch (if it exists) without modifications
          if git ls-remote --exit-code --heads origin cached-data >/dev/null 2>&1; then
            git fetch origin cached-data:refs/remotes/origin/cached-data
            if git cat-file -e origin/cached-data:README.md 2>/dev/null; then
              git show origin/cached-data:README.md > "$README_TMP_PATH"
            fi
          fi

          # Rebuild cached-data as a fresh orphan branch so history always has one commit
          git checkout --orphan cached-data
          git rm -rf . 2>/dev/null || true

          # Restore and stage cache files
          mv "$CACHE_TMP_PATH" __cached_results.json.gz
          mv "$PARQUET_TMP_PATH" __cached_results.parquet
          git add __cached_results.json.gz __cached_results.parquet

          # Restore preserved README.md exactly as it was in cached-data
          if [ -f "$README_TMP_PATH" ]; then
            cp "$README_TMP_PATH" README.md
            git add README.md
          fi

          # Commit with timestamp and file sizes
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          GZIP_MB=$(echo "scale=1; $FILE_SIZE/1024/1024" | bc -l)
          PARQUET_MB=$(echo "scale=1; $PARQUET_SIZE/1024/1024" | bc -l)
          COMMIT_MSG="Update cached results - $TIMESTAMP (json.gz ${GZIP_MB}MB, parquet ${PARQUET_MB}MB)"
          git commit -m "$COMMIT_MSG"

          # Force push keeps remote branch as a single-commit history
          git push origin cached-data --force
          echo "✅ Successfully replaced cached-data branch with a single commit"

      - name: Report status
        if: always()
        run: |
          if [ -f "__cached_results.json.gz" ] && [ -f "__cached_results.parquet" ]; then
            FILE_SIZE=$(stat -f%z __cached_results.json.gz 2>/dev/null || stat -c%s __cached_results.json.gz)
            PARQUET_SIZE=$(stat -f%z __cached_results.parquet 2>/dev/null || stat -c%s __cached_results.parquet)
            echo "✅ Workflow completed."
            echo "   json.gz size: $(echo "scale=1; $FILE_SIZE/1024/1024" | bc -l)MB"
            echo "   parquet size: $(echo "scale=1; $PARQUET_SIZE/1024/1024" | bc -l)MB"
          else
            echo "❌ Workflow failed - one or more cache files missing"
            ls -la __cached_results.* 2>/dev/null || true
          fi
